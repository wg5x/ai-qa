<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} · 本地销售 AI</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand">本地销售 AI</a>
      <nav class="sidebar-nav" aria-label="主菜单">
        <a href="/" class="nav-link{% if active_page == 'qa' %} active{% endif %}">AI 问答</a>
        <a href="/knowledge" class="nav-link{% if active_page == 'knowledge' %} active{% endif %}">知识库</a>
        <a href="/materials" class="nav-link{% if active_page == 'materials' %} active{% endif %}">素材管理</a>
        <a href="/speech-templates" class="nav-link{% if active_page == 'speech' %} active{% endif %}">话术模板</a>
      </nav>
    </aside>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
